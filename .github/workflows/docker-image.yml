name: Build and Push Docker Images

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  frontend-lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: './flipping-calculator-frontend/package-lock.json'
        
    - name: Configure Git for Private Repo Access
      run: |
        git config --global url."https://${{ secrets.THEME_REPO_PAT }}@github.com/".insteadOf "https://github.com/"
        git config --global url."https://${{ secrets.THEME_REPO_PAT }}@github.com/".insteadOf "git@github.com:"
        git config --global url."https://${{ secrets.THEME_REPO_PAT }}@github.com/".insteadOf "ssh://git@github.com/"
      
    - name: Install dependencies
      run: npm ci
      working-directory: ./flipping-calculator-frontend
      
    - name: Run lint
      run: npm run lint
      working-directory: ./flipping-calculator-frontend

  backend-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: flipping_user
          POSTGRES_PASSWORD: flipping_dev_password
          POSTGRES_DB: osrs_flipping_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'
        cache-dependency-path: './flipping-calculator-api/requirements.txt'
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
      working-directory: ./flipping-calculator-api
      
    - name: Run tests
      run: pytest
      working-directory: ./flipping-calculator-api

  build-and-push:
    needs: [frontend-lint, backend-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to the Container registry
      uses: docker/login-action@v3
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Lowercase repository name
      run: |
        REPO_LOWERCASE=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
        echo "REPO_LOWERCASE=$REPO_LOWERCASE" >> $GITHUB_ENV
        
    - name: Build and push API image
      uses: docker/build-push-action@v5
      with:
        context: ./flipping-calculator-api
        file: ./flipping-calculator-api/Dockerfile
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        tags: |
          ghcr.io/${{ env.REPO_LOWERCASE }}/flipping-calculator-api:latest
          ghcr.io/${{ env.REPO_LOWERCASE }}/flipping-calculator-api:${{ github.sha }}

    - name: Build and push Frontend image
      uses: docker/build-push-action@v5
      with:
        context: ./flipping-calculator-frontend
        file: ./flipping-calculator-frontend/Dockerfile
        push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
        build-args: |
          THEME_REPO_PAT=${{ secrets.THEME_REPO_PAT }}
        tags: |
          ghcr.io/${{ env.REPO_LOWERCASE }}/flipping-calculator-frontend:latest
          ghcr.io/${{ env.REPO_LOWERCASE }}/flipping-calculator-frontend:${{ github.sha }}
